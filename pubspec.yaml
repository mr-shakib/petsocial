name: petsocial
description: "PetSocial - Connect with pets and their owners."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP
  dio: ^5.8.0+1

  # Real-Time
  signalr_netcore: ^1.3.5

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Navigation
  go_router: ^14.6.3

  # SVG
  flutter_svg: ^2.0.10+1

  # Fonts
  google_fonts: ^6.2.1

  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  video_player: ^2.9.2

  # Phone Input
  intl_phone_field: ^3.2.0

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.8
  json_serializable: ^6.9.2

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/social_icons/
